data_cfg:
  dataset_name: REDO_Frailty_ccpg_pt1_p+CNN+Tintro+T1+T2
  dataset_root: /cis/net/r38/data/lmcdan11/sils
  frailty_label_file: /cis/home/lmcdan11/OpenGait_silhall/opengait/frailty_label.csv
  dataset_partition: /cis/home/lmcdan11/Documents_Swin/CF_OpenGait/FrailtySet.json
  num_workers: 0
   # data_in_use: [true]
  remove_no_gallery: false # Remove probe if no gallery for it
  test_dataset_name: Dataset_FrailtyGait3D
  cache: true

evaluator_cfg:
  enable_float16: true
  restore_ckpt_strict: false
  restore_hint: /cis/home/lmcdan11/Documents_Swin/OpenGait/opengait/pts/swin_pts/ccpg/SwinGait3D_B1122_C2-20000.pt
  save_name: REDO_Frailty_ccpg_pt1_p+CNN+Tintro+T1+T2
  sampler:
    batch_shuffle: false
    batch_size: 2
    sample_type: all_ordered # all indicates whole sequence used to test, while ordered means input sequence by its natural order; Other options:   fixed_unordered
    frames_all_limit: 80 # limit the number of sampled frames to prevent out of memory
  eval_func: evaluate_scoliosis
  metric: euc # cos
  transform:
    - type: BaseSilCuttingTransform

loss_cfg:
  - loss_term_weight: 1.5
    margin: 0.25
    type: TripletLoss
    log_prefix: triplet
  - loss_term_weight: 2.0
    scale: 20
    type: CrossEntropyLoss
    log_prefix: softmax
    log_accuracy: true
    # PART 1 BASELINE: Regular CE loss (no focal loss, no class weights)
    # gamma: 1.5  # REMOVED - using regular CE, not focal loss
    # class_weights: [1.0, 1.6, 1.0]  # REMOVED - equal weights for all classes

model_cfg:
  model: SwinGait
  Backbone:
    mode: p3d
    in_channels: 1
    layers:
      - 2
      - 2
      - 3
      - 2
    channels:
      - 64
      - 128
    freeze_layers: true  # PART 1 BASELINE: Freeze CNN layers (layer0, layer1, layer2)
  bin_num: 
    - 15
  SeparateBNNecks:
    in_channels: 256
    class_num: 3
    parts_num: 16
    dropout_rate: 0.3  # PART 1 BASELINE: Moderate dropout (no freezing, so less regularization needed)
  # PART 1 BASELINE: No backbone_lr (uses default base_lr * 0.1 for all backbone layers)
  #backbone_lr: [0.00019, 0.00029, 0.00059, 0.0019]  # REMOVED
  SwinTransformerBlock3D:
    frozen_stages: -1  # PART 1 BASELINE: No frozen stages (all transformer layers trainable, including patch_embed)
    drop: 0.3  # PART 1 BASELINE: Moderate dropout
    attn_drop: 0.2  # PART 1 BASELINE: Moderate attention dropout
    drop_path: 0.2  # PART 1 BASELINE: Moderate drop path
    use_checkpoint: true

optimizer_cfg:
  lr: 0.0001  # PART 1 BASELINE: Standard learning rate
  solver: AdamW
  weight_decay: 0.001  # PART 1 BASELINE: Moderate weight decay

scheduler_cfg:
  gamma: 0.5
  milestones: # Learning Rate Reduction at each milestones
    - 15000
    - 30000
    - 50000
    - 70000
    - 90000
  scheduler: MultiStepLR

trainer_cfg:
  seed: 42  # Fixed seed for reproducibility
  enable_float16: false
  fix_BN: true
  log_iter: 100
  with_test: true
  optimizer_reset: True
  restore_ckpt_strict: false
  restore_hint: /cis/home/lmcdan11/Documents_Swin/OpenGait/opengait/pts/swin_pts/ccpg/SwinGait3D_B1122_C2-20000.pt
  save_iter: 500
  save_name: REDO_Frailty_ccpg_pt1_p+CNN+Tintro+T1+T2
  sync_BN: true
  T_max_iter: 10000
  total_iter: 10000
  find_unused_parameters: true
  grad_clip: 1.0
  sampler:
    batch_shuffle: true
    batch_size:
      - 4
      - 4
    frames_num_fixed: 60
    frames_skip_num: 3
    sample_type: fixed_ordered
    type: TripletSampler
  transform:
    - type: Compose
      trf_cfg:
        - type: RandomPerspective
          prob: 0.2
        - type: BaseSilCuttingTransform
        - type: RandomHorizontalFlip
          prob: 0.2  # PART 1 BASELINE: Basic augmentation (not optimized)
        - type: RandomRotate
          prob: 0.2  # PART 1 BASELINE: Basic augmentation (not optimized)
        # PART 1 BASELINE: No RandomAffine or RandomErasing (basic augmentation only)

