data_cfg:
  dataset_name: Frailty
  dataset_root: /your/path/to/sils
  frailty_label_file: opengait/frailty_label.csv
  dataset_partition: FrailtySet.json
  num_workers: 0
  remove_no_gallery: false # Remove probe if no gallery for it
  test_dataset_name: Frailty
  cache: true

evaluator_cfg:
  enable_float16: true
  restore_ckpt_strict: false
  restore_hint: /your/path/to/SwinGait3D_B1122_C2-20000.pt

  save_name: Frailty
  sampler:
    batch_shuffle: false
    batch_size: 2
    sample_type: all_ordered # all indicates whole sequence used to test, while ordered means input sequence by its natural order; Other options:   fixed_unordered
    frames_all_limit: 80 # limit the number of sampled frames to prevent out of memory
  eval_func: evaluate_scoliosis
  metric: euc # cos
  transform:
    - type: BaseSilCuttingTransform

loss_cfg:
  - loss_term_weight: 1.5
    margin: 0.25
    type: TripletLoss
    log_prefix: triplet
  - loss_term_weight: 2.0
    scale: 20
    type: CrossEntropyLoss
    log_prefix: softmax
    log_accuracy: true
    gamma: 1.5
    class_weights: [1.0, 1.6, 1.0]
model_cfg:
  model: SwinGait
  Backbone:
    mode: p3d
    in_channels: 1
    layers:
      - 2
      - 2
      - 3
      - 2
    channels:
      - 64
      - 128
    freeze_layers: true
  bin_num: 
    - 15
  SeparateBNNecks:
    in_channels: 256
    class_num: 3
    parts_num: 16
    dropout_rate: 0.5
  backbone_lr: [0.00019, 0.00029, 0.00059, 0.0019] 
  SwinTransformerBlock3D:
    frozen_stages: 1
    drop: 0.5
    attn_drop: 0.4
    drop_path: 0.35
    use_checkpoint: true
      





optimizer_cfg:
  lr: 0.0001
  solver: AdamW
  weight_decay: 0.0025


scheduler_cfg:
  gamma: 0.5
  milestones: # Learning Rate Reduction at each milestones
    - 15000
    - 30000
    - 50000
    - 70000
    - 90000
  scheduler: MultiStepLR

trainer_cfg:
  enable_float16: false # half_percesion float for memory reduction and speedup
  fix_BN: true
  log_iter: 100
  with_test: true
  optimizer_reset: True
  restore_ckpt_strict: false
  restore_hint: /your/path/to/SwinGait3D_B1122_C2-20000.pt
  save_iter: 500
  save_name: Frailty
  sync_BN: true
  T_max_iter: 60000
  total_iter: 80000
  find_unused_parameters: true
  grad_clip: 1.0
  sampler:
    batch_shuffle: true
    batch_size:
      - 4
      - 4
    frames_num_fixed: 60
    frames_skip_num: 3
    sample_type: fixed_ordered # fixed control input frames number, unordered for controlling order of input tensor; Other options: unfixed_ordered or all_ordered
    type: TripletSampler
  transform:
    - type: Compose
      trf_cfg:
        - type: BaseSilCuttingTransform
        - type: RandomHorizontalFlip
          prob: 0.25
        - type: RandomRotate
          prob: 0.3
          degrees: 6
        - type: RandomAffine
          prob: 0.2
          degrees: 42 
          translate: 0.08
          scale: [0.9, 1.1]
        - type: RandomErasing
          prob: 0.25
          sl: 0.02
          sh: 0.15
        - type: RandomPerspective
          prob: 0.2

